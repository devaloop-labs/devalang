[package]
name = "devalang"
version = "0.0.0-alpha.0"
authors = ["Devaloop <contact@devaloop.com>"]
description = "A domain-specific language for music and sound automation"
license = "MIT"
repository = "https://github.com/devaloop-labs/devalang"
keywords = ["music", "dsl", "audio", "cli"]
categories = ["command-line-utilities", "audio", "development-tools"]
readme = "README.md"
homepage = "https://devaloop.com"
documentation = "https://docs.rs/devalang"
edition = "2024"

[[bin]]
name = "devalang"
path = "rust/main.rs"

[lib]
path = "rust/lib.rs"
crate-type = ["cdylib"]

[profile.release]
opt-level = "s"

[features]
default = ["cli"]
cli = ["crossterm"]

[dependencies]
clap = { version = "4.5", features = ["derive"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
rodio = "0.17"
hound = "3.4.0"
toml = "0.8"
notify = "6.1"
fs_extra = "1.3"
include_dir = "0.7"
wasm-bindgen = "0.2"
serde-wasm-bindgen = "0.4"
nom_locate = "4.0.0"
chrono = "0.4"
crossterm =  { version = "0.27", optional = true }